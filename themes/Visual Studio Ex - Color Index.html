<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цвета по группам</title>
    <style>
        .color-box {
            width: 100px;
            height: 100px;
            display: inline-block;
            margin: 5px;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid #000;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        .group {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Цвета по группам</h1>
    <div id="saturated" class="group">
        <h2>Насыщенные</h2>
    </div>
    <div id="light" class="group">
        <h2>Светлые</h2>
    </div>
    <div id="dull" class="group">
        <h2>Блеклые</h2>
    </div>

    <script>
        const colors = [
            "#000000", "#000080", "#00008B", "#0000CD", "#0000FF",
            "#006400", "#008000", "#008080", "#008B8B", "#00BFFF", "#00CED1",
            "#00FA9A", "#00FF00", "#00FF7F", "#00FFFF", "#0C07FF", "#191970",
            "#1E90FF", "#20B2AA", "#228B22", "#26B31A", "#2E8B57", "#2F4F4F",
            "#32CD32", "#3CB371", "#40E0D0", "#4169E1", "#4682B4",
            "#483D8B", "#48D1CC", "#4B0082", "#556B2F", "#5F9EA0", "#6495ED",
            "#66CDAA", "#68685B", "#687687", "#696969", "#6A5ACD", "#6B8E23",
            "#70727E", "#708090", "#778899", "#7B68EE", "#7CFC00", "#7FFF00",
            "#7FFFD4", "#800000", "#800080", "#808000", "#808080", "#87CEEB",
            "#87CEFA", "#8A2BE2", "#8B0000", "#8B008B", "#8B4513", "#8FBC8F",
            "#90EE90", "#9370DB", "#9400D3", "#98FB98", "#9932CC", "#9ACD32",
            "#9DA7C3", "#A0522D", "#A31515", "#A52A2A", "#A9A9A9", "#ADD8E6",
            "#ADFF2F", "#AFEEEE", "#B0C4DE", "#B0E0E6", "#B22222", "#B8860B",
            "#B90690", "#BA55D3", "#BC8F8F", "#BDB76B", "#BFBFBF", "#C0C0C0",
            "#C71585", "#CD5C5C", "#CD853F", "#D2691E", "#D2B48C", "#D3D3D3",
            "#D8BFD8", "#DA70D6", "#DAA520", "#DB7093", "#DC143C", "#DCDCDC",
            "#DDA0DD", "#DEB887", "#E0FFFF", "#E6E6FA", "#E9967A", "#ecede0",
            "#EE82EE", "#EEE8AA", "#F08080", "#F0E68C", "#F0F8FF", "#F0FFF0",
            "#F0FFFF", "#F4A460", "#F5DEB3", "#F5F5DC", "#F5F5F5", "#F5FFFA",
            "#F8F8FF", "#FA8072", "#FAEBD7", "#FAF0E6", "#FAFAD2", "#FDF5E6",
            "#FF0000", "#FF00FF", "#FF1493", "#FF4500", "#FF6347", "#FF69B4",
            "#FF7F50", "#FF8C00", "#FFA07A", "#FFA500", "#FFB6C1", "#FFC0CB",
            "#FFD0D0", "#FFD700", "#FFDAB9", "#FFDEAD", "#FFE4B5", "#FFE4C4",
            "#FFE4E1", "#FFEBCD", "#FFEFD5", "#FFF0F5", "#FFF5EE", "#FFF8DC",
            "#FFFACD", "#FFFAF0", "#FFFAFA", "#FFFF00", "#FFFFE0", "#FFFFF0",
            "#FFFFFF"
        ];

        // Функция для преобразования RGB в HSL
        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0; // ахроматический
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [h, s, l];
        }

        // Функция для сортировки цветов
        function sortColorsByHueAndLightness(colors) {
            return colors.sort((a, b) => {
                const [rA, gA, bA] = [parseInt(a.slice(1, 3), 16), parseInt(a.slice(3, 5), 16), parseInt(a.slice(5, 7), 16)];
                const [rB, gB, bB] = [parseInt(b.slice(1, 3), 16), parseInt(b.slice(3, 5), 16), parseInt(b.slice(5, 7), 16)];
                const [hA, sA, lA] = rgbToHsl(rA, gA, bA);
                const [hB, sB, lB] = rgbToHsl(rB, gB, bB);
                return hA - hB || lA - lB || sA - sB;
            });
        }

        const saturatedColors = [];
        const lightColors = [];
        const dullColors = [];

        // Классификация цветов
        colors.forEach(color => {
            const [r, g, b] = [parseInt(color.slice(1, 3), 16), parseInt(color.slice(3, 5), 16), parseInt(color.slice(5, 7), 16)];
            const [h, s, l] = rgbToHsl(r, g, b);

            if (l > 0.8) {
                lightColors.push(color);
            } else if (s > 0.5) {
                saturatedColors.push(color);
            } else {
                dullColors.push(color);
            }
        });

        const sortedSaturatedColors = sortColorsByHueAndLightness(saturatedColors);
        const sortedLightColors = sortColorsByHueAndLightness(lightColors);
        const sortedDullColors = sortColorsByHueAndLightness(dullColors);

        const saturatedContainer = document.getElementById('saturated');
        const lightContainer = document.getElementById('light');
        const dullContainer = document.getElementById('dull');

        sortedSaturatedColors.forEach(color => {
            const colorBox = document.createElement('div');
            colorBox.className = 'color-box';
            colorBox.style.backgroundColor = color;
            colorBox.textContent = color;
            saturatedContainer.appendChild(colorBox);
        });

        sortedLightColors.forEach(color => {
            const colorBox = document.createElement('div');
            colorBox.className = 'color-box';
            colorBox.style.backgroundColor = color;
            colorBox.textContent = color;
            lightContainer.appendChild(colorBox);
        });

        sortedDullColors.forEach(color => {
            const colorBox = document.createElement('div');
            colorBox.className = 'color-box';
            colorBox.style.backgroundColor = color;
            colorBox.textContent = color;
            dullContainer.appendChild(colorBox);
        });
    </script>
</body>
</html>
